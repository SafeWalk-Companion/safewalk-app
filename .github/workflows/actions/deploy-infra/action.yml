name: 'Deploy Infrastructure'
description: 'Deploy CDK infrastructure stacks to AWS'

inputs:
  vendor-id:
    required: true
  api-key:
    required: true
  webhook-secret:
    required: true
  platform-domain:
    required: true
  aws-account-id:
    description: 'AWS Account ID'
    required: true
  aws-region:
    description: 'AWS Region'
    required: true
    default: 'eu-central-1'
  node-version:
    description: 'Node.js version'
    required: false
    default: '20'
  fcm-service-account-json:
    description: 'Firebase service account JSON (for SNS FCM integration)'
    required: true

runs:
  using: 'composite'
  steps:
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ inputs.node-version }}

    - name: Write FCM service account key
      shell: bash
      run: echo '${{ inputs.fcm-service-account-json }}' > Backend/infra/fcm-service-account.json

    - name: Install Backend root dependencies
      shell: bash
      working-directory: Backend
      run: npm ci

    - name: Install dependencies
      shell: bash
      working-directory: Backend/infra
      run: npm ci

    - name: Build TypeScript
      shell: bash
      working-directory: Backend/infra
      run: npm run build

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        role-to-assume: arn:aws:iam::${{ inputs.aws-account-id }}:role/github-actions-deployment-role
        aws-region: ${{ inputs.aws-region }}

    - name: CDK Diff Backend
      if: github.event_name == 'pull_request'
      shell: bash
      working-directory: Backend/infra
      env:
        API_KEY: ${{ inputs.api-key }}
        WEBHOOK_SECRET: ${{ inputs.webhook-secret }}
        PLATFORM_DOMAIN: ${{ inputs.platform-domain }}
        VENDOR_ID: ${{ inputs.vendor-id }}
      run: npx cdk diff --all

    - name: CDK Deploy Backend
      if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
      shell: bash
      working-directory: Backend/infra
      env:
        API_KEY: ${{ inputs.api-key }}
        WEBHOOK_SECRET: ${{ inputs.webhook-secret }}
        PLATFORM_DOMAIN: ${{ inputs.platform-domain }}
        VENDOR_ID: ${{ inputs.vendor-id }}
        MAPBOX_ACCESS_TOKEN: ${{ inputs.mapbox-access-token }}
      run: npx cdk deploy --all --require-approval never
