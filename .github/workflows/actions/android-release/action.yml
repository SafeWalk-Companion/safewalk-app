name: Build Android APK
description: Build Android APK for release

inputs:
  firebase-env-json:
    required: true

runs:
  using: composite
  steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: '17'

    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        channel: stable

    - name: Prepare Firebase env
      working-directory: Frontend/safewalk
      env:
        FIREBASE_ENV_JSON: ${{ inputs.firebase-env-json }}
      shell: bash
      run: |
        if [ -z "$FIREBASE_ENV_JSON" ]; then
          echo "FIREBASE_ENV_JSON secret is missing" >&2
          exit 1
        fi
        echo "$FIREBASE_ENV_JSON" > firebase.env.json

    - name: Install dependencies
      working-directory: Frontend/safewalk
      shell: bash
      run: flutter pub get

    - name: Build release APK
      working-directory: Frontend/safewalk
      shell: bash
      run: flutter build apk --dart-define-from-file=firebase.env.json

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: safewalk-app-release-apk
        path: Frontend/safewalk/build/app/outputs/flutter-apk/app-release.apk

