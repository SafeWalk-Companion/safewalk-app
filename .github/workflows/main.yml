name: SafeWalk App

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened, edited]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read
  pull-requests: write

env:
  AWS_REGION: eu-central-1

jobs:
  check-pr-title:
    if: github.event_name == 'pull_request'
    name: Check PR Title
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Check PR Title Format
        uses: ./.github/workflows/actions/check-title
        with:
          title: ${{ github.event.pull_request.title }}

      - name: Comment on PR if invalid
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const message = `## PR Title Format Check Failed

            Your PR title does not match the required conventional commit format.

            **Expected format:** \`<type>[(scope)]: [SW-XXX] <description>\`

            **Valid types:** build, chore, ci, config, docs, feat, fix, perf, refactor, revert, style, test

            **Scope:** Optional, alphanumeric

            **Kanban reference:** Optional, format \`[SW-XXX]\`

            Please update your PR title to match this format.`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: message
            });

  detect-backend-changes:
    name: Detect Backend Changes
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Check changed paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            backend:
              - 'Backend/**'

  detect-frontend-changes:
    name: Detect Frontend Changes
    runs-on: ubuntu-latest
    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Check changed paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            frontend:
              - 'Frontend/**'

  test-backend:
    name: Test Backend
    needs: detect-backend-changes
    if: needs.detect-backend-changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install lambda dependencies
        working-directory: Backend/lambda
        run: npm ci

      - name: Run lambda unit tests
        working-directory: Backend/lambda
        run: npm test

  test-frontend:
    name: Test Frontend
    needs: detect-frontend-changes
    if: needs.detect-frontend-changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install Flutter dependencies
        working-directory: Frontend/safewalk
        run: flutter pub get

      - name: Run Flutter tests with coverage
        working-directory: Frontend/safewalk
        run: flutter test --coverage

      - name: Enforce coverage threshold
        working-directory: Frontend/safewalk
        run: |
          sudo apt-get update
          sudo apt-get install -y lcov
          lcov --remove coverage/lcov.info \
            'lib/views/**' \
            'lib/firebase_options.dart' \
            'lib/services/push_notification_service.dart' \
            -o coverage/lcov.filtered.info
          lcov --summary coverage/lcov.filtered.info
          COVERAGE=$(lcov --summary coverage/lcov.filtered.info | awk '/lines/{print $2}' | sed 's/%//')
          COVERAGE_INT=${COVERAGE%.*}
          if [ "$COVERAGE_INT" -lt 75 ]; then
            echo "Line coverage ${COVERAGE}% is below 80%."
            exit 1
          fi

  deploy-infra:
    name: Deploy Infrastructure
    needs: [detect-backend-changes, test-backend]
    if: |
      github.event_name != 'pull_request' &&
      needs.detect-backend-changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Deploy Infrastructure
        uses: ./.github/workflows/actions/deploy-infra
        with:
          vendor-id: ${{ secrets.VENDOR_ID }}
          api-key: ${{ secrets.API_KEY }}
          webhook-secret: ${{ secrets.WEBHOOK_SECRET }}
          platform-domain: ${{ secrets.PLATFORM_DOMAIN }}
          aws-account-id: ${{ secrets.AWS_ACCOUNT_ID }}
          aws-region: ${{ env.AWS_REGION }}
          fcm-service-account-json: ${{ secrets.FCM_SERVICE_ACCOUNT_JSON }}
          mapbox-access-token: ${{ secrets.MAPBOX_ACCESS_TOKEN }}
